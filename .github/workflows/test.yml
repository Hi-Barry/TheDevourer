name: CI — Linux 测试 + Windows 打包

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux 完整测试 ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install watchdog Pillow python-docx openpyxl python-pptx PyPDF2

      - name: 运行全部测试（逐个执行，超时控制）
        run: |
          for f in tests/test_*.py; do
            echo "=== $(basename $f) ==="
            timeout 60 python "$f" && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }
          done

  # ── Windows PyInstaller 打包 ──────────────────
  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt pyinstaller

      - name: 验证打包环境
        shell: pwsh
        run: |
          python -c "import PyInstaller; print(f'PyInstaller {PyInstaller.__version__}')"
          python -c "import PySide6; print('PySide6 OK')"
          python -c "from PIL import Image; print('Pillow OK')"

      - name: PyInstaller 打包 exe
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole --name TheDevourer `
            --add-data "resources;resources" `
            --hidden-import "PySide6.QtCore" --hidden-import "PySide6.QtGui" `
            --hidden-import "PySide6.QtWidgets" --hidden-import "PySide6.QtNetwork" `
            --hidden-import "docx" --hidden-import "openpyxl" --hidden-import "pptx" `
            --hidden-import "PyPDF2" --hidden-import "PIL" --hidden-import "PIL._imaging" `
            --hidden-import "httpx" --hidden-import "openai" --hidden-import "watchdog" `
            --hidden-import "yaml" --hidden-import "chardet" --hidden-import "sqlite3" `
            --hidden-import "chromadb" `
            --exclude-module "PySide6.QtQml" --exclude-module "PySide6.QtQuick" `
            --exclude-module "PySide6.QtWebEngineCore" --exclude-module "PySide6.QtWebEngineWidgets" `
            --exclude-module "PySide6.QtCharts" --exclude-module "PySide6.QtDataVisualization" `
            --exclude-module "PySide6.Qt3DCore" --exclude-module "numpy" `
            main.py 2>&1
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: 检查打包产物
        shell: pwsh
        run: |
          if (Test-Path "dist\TheDevourer.exe") {
            $size = (Get-Item "dist\TheDevourer.exe").Length
            echo "✅ 打包成功: dist\TheDevourer.exe ($([math]::Round($size/1MB, 1)) MB)"
          } else {
            echo "❌ 打包失败: exe 未生成"
            Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: TheDevourer-Windows-x64
          path: dist\TheDevourer.exe
