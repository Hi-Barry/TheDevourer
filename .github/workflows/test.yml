name: CI — Windows 测试 + 打包

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux 快速逻辑测试（不含 PySide6/GUI）──────
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install watchdog chromadb Pillow python-docx openpyxl python-pptx PyPDF2

      - name: 运行纯逻辑测试（不含 GUI 依赖）
        run: |
          for f in tests/test_config.py tests/test_db.py tests/test_logger.py tests/test_manifest.py tests/test_signal_bus.py tests/test_module_loader.py tests/test_pack_module.py tests/test_upgrade.py; do
            echo "=== $f ==="
            timeout 60 python "$f" || exit 1
          done

  # ── Windows 核心测试 ─────────────────────────
  test:
    needs: quick-test
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行服务端测试（不含 GUI）
        shell: pwsh
        run: |
          $tests = @(
            "tests\test_config.py",
            "tests\test_db.py",
            "tests\test_logger.py",
            "tests\test_manifest.py",
            "tests\test_signal_bus.py",
            "tests\test_module_loader.py",
            "tests\test_pack_module.py",
            "tests\test_upgrade.py",
            "tests\test_file_classifier.py",
            "tests\test_content_classifier.py",
            "tests\test_storage_manager.py",
            "tests\test_main_launcher.py",
            "tests\test_plugin_feed_handler.py"
          )
          foreach ($t in $tests) {
            Write-Host "=== $t ==="
            python $t
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

  # ── PyInstaller 打包 ──────────────────────────
  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller 打包
        run: |
          pyinstaller tools\pyinstaller_win.spec

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: TheDevourer-Windows-x64
          path: dist\TheDevourer.exe
