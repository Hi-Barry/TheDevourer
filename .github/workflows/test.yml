name: CI — Linux 测试 + Windows 打包

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux 完整测试 ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install watchdog Pillow python-docx openpyxl python-pptx PyPDF2

      - name: 运行全部测试（逐个执行，超时控制）
        run: |
          for f in tests/test_*.py; do
            echo "=== $(basename $f) ==="
            timeout 60 python "$f" && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }
          done

  # ── Windows PyInstaller 打包 ──────────────────
  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt pyinstaller

      - name: 验证打包环境
        shell: pwsh
        run: |
          python -c "import PyInstaller; print(f'PyInstaller {PyInstaller.__version__}')"
          python -c "import PySide6; print('PySide6 OK')"
          python -c "from PIL import Image; print('Pillow OK')"
          echo "Spec 文件存在: $(if(Test-Path tools/pyinstaller_win.spec){'✅ yes'}else{'❌ no'})"

      - name: 测试 PyInstaller 基本打包（验证环境）
        shell: pwsh
        continue-on-error: true
        run: |
          echo "尝试基础打包..."
          pyinstaller --onefile --noconsole --name TheDevourer_test `
            --hidden-import PySide6.QtCore --hidden-import PySide6.QtGui `
            --hidden-import PySide6.QtWidgets `
            --add-data "resources;resources" `
            main.py 2>&1 | Select-String -Pattern "(error|Error|ERROR|FAIL|fail|traceback|Traceback)" -SimpleMatch
          echo "Exit code: $LASTEXITCODE"
          if (Test-Path "dist/TheDevourer_test.exe") {
            $size = (Get-Item "dist/TheDevourer_test.exe").Length
            echo "✅ 基础打包成功: $([math]::Round($size/1MB, 1)) MB"
          }

      - name: PyInstaller 完整打包（spec 文件）
        shell: pwsh
        run: |
          echo "开始 spec 打包..."
          $output = pyinstaller tools/pyinstaller_win.spec 2>&1
          if ($LASTEXITCODE -ne 0) {
            echo "=== 错误日志 ==="
            $output | Select-String -Pattern "(error|Error|ERROR|FAIL|fail|traceback|Traceback|exception)" -SimpleMatch
            echo "=== 最后 50 行 ==="
            $output | Select-Object -Last 50
            exit 1
          }
          echo "✅ 打包完成"

      - name: 检查打包产物
        shell: pwsh
        run: |
          if (Test-Path "dist\TheDevourer.exe") {
            $size = (Get-Item "dist\TheDevourer.exe").Length
            echo "✅ 打包成功: dist\TheDevourer.exe ($([math]::Round($size/1MB, 1)) MB)"
          } else {
            echo "❌ 打包失败: exe 未生成"
            Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: TheDevourer-Windows-x64
          path: dist\TheDevourer.exe
